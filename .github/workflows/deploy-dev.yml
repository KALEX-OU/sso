# CI/CD: build + deploy dell'SSO gateway (Next standalone) su Cloud Run (kalex-dev) via WIF.
# I NEXT_PUBLIC_* sono inlined a build-time → passati come --build-arg. Sono valori NON segreti
# (config Firebase Web + reCAPTCHA site key). Per staging/prod: spostarli in GitHub Environment vars.
name: Deploy sso → dev

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: kalex-dev
  REGION: europe-west4
  SERVICE: kalex-sso-dev
  IMAGE: europe-west4-docker.pkg.dev/kalex-dev/kalex/sso

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/500617101197/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: kalex-ci@kalex-dev.iam.gserviceaccount.com

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker europe-west4-docker.pkg.dev --quiet

      - name: Build & push (Next standalone, build-args per ambiente)
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_BASE_DOMAIN=dev.kalexs.com \
            --build-arg NEXT_PUBLIC_SSO_URL=https://sso.dev.kalexs.com \
            --build-arg NEXT_PUBLIC_API_URL=https://api.dev.kalexs.com \
            --build-arg NEXT_PUBLIC_FIREBASE_API_KEY=AIzaSyBVB0VVFiDwEsXONpXB3D6QsjXXjzg2iW4 \
            --build-arg NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=kalex-dev.firebaseapp.com \
            --build-arg NEXT_PUBLIC_FIREBASE_PROJECT_ID=kalex-dev \
            --build-arg NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=kalex-dev.firebasestorage.app \
            --build-arg NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=500617101197 \
            --build-arg NEXT_PUBLIC_FIREBASE_APP_ID=1:500617101197:web:33fb89a98d604a071687c4 \
            --build-arg NEXT_PUBLIC_RECAPTCHA_SITE_KEY=6LdHVkstAAAAAOjtjJGLGBfxXRkKVmrxu_zTkV3s \
            -t "${IMAGE}:${GITHUB_SHA}" .
          docker push "${IMAGE}:${GITHUB_SHA}"

      - name: Deploy Cloud Run
        run: |
          gcloud run deploy "$SERVICE" \
            --image="${IMAGE}:${GITHUB_SHA}" \
            --region="$REGION" --project="$PROJECT_ID" \
            --quiet
