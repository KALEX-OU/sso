# CI/CD: build + deploy SSO gateway su Cloud Run (kalex-com / PROD) via WIF. Trigger MANUALE.
name: Deploy sso → prod

on:
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: kalex-com
  REGION: europe-west4
  SERVICE: kalex-sso-prod
  IMAGE: europe-west4-docker.pkg.dev/kalex-com/kalex/sso

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/794473909457/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: kalex-ci@kalex-com.iam.gserviceaccount.com

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker europe-west4-docker.pkg.dev --quiet

      - name: Build & push (Next standalone, build-args prod)
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_BASE_DOMAIN=kalexs.com \
            --build-arg NEXT_PUBLIC_SSO_URL=https://sso.kalexs.com \
            --build-arg NEXT_PUBLIC_API_URL=https://api.kalexs.com \
            --build-arg NEXT_PUBLIC_FIREBASE_API_KEY=AIzaSyDMRxzjoovPHQsz-n2E2skxz7a0cejAsHI \
            --build-arg NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=kalex-com.firebaseapp.com \
            --build-arg NEXT_PUBLIC_FIREBASE_PROJECT_ID=kalex-com \
            --build-arg NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=kalex-com.firebasestorage.app \
            --build-arg NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=794473909457 \
            --build-arg NEXT_PUBLIC_FIREBASE_APP_ID=1:794473909457:web:6b1b888d8e0325166849f0 \
            --build-arg NEXT_PUBLIC_RECAPTCHA_SITE_KEY=6LcrnEstAAAAAIBW3y-PnLjphWyHmvxIYk-ZRTen \
            -t "${IMAGE}:${GITHUB_SHA}" .
          docker push "${IMAGE}:${GITHUB_SHA}"

      - name: Deploy Cloud Run
        run: |
          gcloud run deploy "$SERVICE" \
            --image="${IMAGE}:${GITHUB_SHA}" \
            --region="$REGION" --project="$PROJECT_ID" \
            --quiet
