# CI/CD: build + deploy SSO gateway su Cloud Run (kalex-staging) via WIF. Trigger MANUALE.
# I NEXT_PUBLIC_* (config Firebase Web + reCAPTCHA, NON segreti) sono inlined a build-time.
name: Deploy sso → staging

on:
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: kalex-staging
  REGION: europe-west4
  SERVICE: kalex-sso-staging
  IMAGE: europe-west4-docker.pkg.dev/kalex-staging/kalex/sso

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/532288262615/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: kalex-ci@kalex-staging.iam.gserviceaccount.com

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker europe-west4-docker.pkg.dev --quiet

      - name: Build & push (Next standalone, build-args staging)
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_BASE_DOMAIN=staging.kalexs.com \
            --build-arg NEXT_PUBLIC_SSO_URL=https://sso.staging.kalexs.com \
            --build-arg NEXT_PUBLIC_API_URL=https://api.staging.kalexs.com \
            --build-arg NEXT_PUBLIC_FIREBASE_API_KEY=AIzaSyBvrMorXhR4pxNhnb-xGTh5bBjkI5yGxtc \
            --build-arg NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=kalex-staging.firebaseapp.com \
            --build-arg NEXT_PUBLIC_FIREBASE_PROJECT_ID=kalex-staging \
            --build-arg NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=kalex-staging.firebasestorage.app \
            --build-arg NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=532288262615 \
            --build-arg NEXT_PUBLIC_FIREBASE_APP_ID=1:532288262615:web:3fdfcb9e7c79b004d13b92 \
            --build-arg NEXT_PUBLIC_RECAPTCHA_SITE_KEY=6LfCh0stAAAAAOMMBf-C14toNoSDJifMPEz2weqe \
            -t "${IMAGE}:${GITHUB_SHA}" .
          docker push "${IMAGE}:${GITHUB_SHA}"

      - name: Deploy Cloud Run
        run: |
          gcloud run deploy "$SERVICE" \
            --image="${IMAGE}:${GITHUB_SHA}" \
            --region="$REGION" --project="$PROJECT_ID" \
            --quiet
